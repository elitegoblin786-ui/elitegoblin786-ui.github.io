services:
  - type: web
    name: thebrandhouse-backoffice
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    disk:
      name: thebrandhouse-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: TBH_STORAGE_DIR
        value: /opt/render/project/src/storage
