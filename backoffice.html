<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBrandHouse | Back Office Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-backoffice="login" class="backoffice-body">
  <main class="backoffice-login-shell">
    <section class="backoffice-login-card reveal is-visible">
      <div class="backoffice-brand-lockup">
        <img src="thebrandhouse_ltd_logo_transparent.png" alt="TheBrandHouse logo" class="backoffice-logo">
        <div>
          <span class="backoffice-kicker">TheBrandHouse</span>
          <h1>Back Office Access</h1>
          <p>Authorized access for approved company administrators.</p>
        </div>
      </div>

      <form id="backofficeLoginForm" class="backoffice-form">
        <label>
          Username
          <input id="backofficeUsername" type="text" autocomplete="username" required>
        </label>
        <label>
          Password
          <div class="password-field">
            <input id="backofficePassword" type="password" autocomplete="current-password" required>
            <button id="toggleBackofficePassword" class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
              <svg class="password-eye" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
                <circle cx="12" cy="12" r="3.2"></circle>
              </svg>
            </button>
          </div>
        </label>
        <button class="btn btn-primary backoffice-submit" type="submit">Sign In</button>
        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="cms.js"></script>
  <script src="backoffice.js"></script>
</body>
</html>
