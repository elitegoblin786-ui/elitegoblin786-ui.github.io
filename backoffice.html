<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBrandHouse | Back Office Login</title>
  <link rel="icon" type="image/png" href="thebrandhouse_ltd_logo_transparent.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dark-mode.css">
  <link rel="stylesheet" href="video-animations.css">
</head>
<body data-backoffice="login" class="backoffice-body">
  <div class="backoffice-atmosphere" aria-hidden="true">
    <div class="backoffice-aura backoffice-aura-one"></div>
    <div class="backoffice-aura backoffice-aura-two"></div>
    <div class="backoffice-aura backoffice-aura-three"></div>
    <div class="backoffice-gridlines"></div>
    <div class="backoffice-beam backoffice-beam-one"></div>
    <div class="backoffice-beam backoffice-beam-two"></div>
    <span class="backoffice-particle particle-1"></span>
    <span class="backoffice-particle particle-2"></span>
    <span class="backoffice-particle particle-3"></span>
    <span class="backoffice-particle particle-4"></span>
    <span class="backoffice-particle particle-5"></span>
    <span class="backoffice-particle particle-6"></span>
    <span class="backoffice-particle particle-7"></span>
    <span class="backoffice-particle particle-8"></span>
  </div>
  <main class="backoffice-login-shell">
    <section class="backoffice-login-card reveal is-visible">
      <div class="backoffice-brand-lockup">
        <img src="thebrandhouse_ltd_logo_transparent.png" alt="TheBrandHouse logo" class="backoffice-logo">
        <div>
          <span class="backoffice-kicker">TheBrandHouse</span>
          <h1>Back Office Access</h1>
          <p>Authorized access for approved company administrators.</p>
          <div class="backoffice-pill-row" aria-hidden="true">
            <span class="backoffice-pill">Secure Session</span>
            <span class="backoffice-pill backoffice-pill-cool">Live Content Control</span>
            <span class="backoffice-pill backoffice-pill-soft">Media Ready</span>
          </div>
        </div>
      </div>

      <form id="backofficeLoginForm" class="backoffice-form">
        <label>
          Username
          <input id="backofficeUsername" type="text" autocomplete="username" required>
        </label>
        <label>
          Password
          <div class="password-field">
            <input id="backofficePassword" type="password" autocomplete="current-password" required>
            <button id="toggleBackofficePassword" class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
              <svg class="password-eye" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
                <circle cx="12" cy="12" r="3.2"></circle>
              </svg>
            </button>
          </div>
        </label>
        <button class="btn btn-primary backoffice-submit" type="submit">Sign In</button>
        <p id="loginError" class="login-error" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="/cms.js"></script>
  <script src="/backoffice.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" integrity="sha512-cG2AHzRY4F19FHv9+1n2Y9OCeV46y82j2bfMVuYUqgz0+U9q4YJ06KIXS0FdxpO5I9iO8A6HvLEyLgDdf2lt6Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    if (window.gsap) {
      window.addEventListener("load", function () {
        const animateCards = (selector) => {
          const cards = document.querySelectorAll(selector);
          if (!cards.length) return;

          cards.forEach((card, index) => {
            const delay = index * 0.15;

            gsap.set(card, { opacity: 0, y: 48, scale: 0.96 });

            gsap.to(card, {
              duration: 0.9,
              opacity: 1,
              y: 0,
              scale: 1,
              ease: "power3.out",
              delay: delay
            });

            card.addEventListener('mouseenter', () => {
              gsap.to(card, { duration: 0.25, scale: 1.02, ease: "power2.out" });
            });

            card.addEventListener('mouseleave', () => {
              gsap.to(card, { duration: 0.25, scale: 1, ease: "power2.out" });
            });
          });
        };

        animateCards(".backoffice-login-card");
      });
    }
  </script>
</body>
</html>
